<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นัดปรึกษาออนไลน์ — VP Kanniporn FWD</title>
    <link rel="icon" type="image/svg+xml" href="/assets/Logo.svg">
    <link rel="shortcut icon" href="/assets/Logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .req::after { content: " *"; color: #ef4444; }
        .field-input {
            width: 100%; padding: 11px 14px; border: 1px solid #e5e7eb; border-radius: 12px;
            font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s, box-shadow .2s;
        }
        .field-input:focus { border-color: #FF6B00; box-shadow: 0 0 0 3px rgba(255,107,0,0.15); }
        .opt-chip {
            display: flex; align-items: center; gap: 8px; padding: 12px 14px; border: 1px solid #e5e7eb;
            border-radius: 12px; cursor: pointer; font-size: 14px; transition: all .15s; user-select: none;
        }
        .opt-chip:hover { border-color: #fdba74; background: #fff7ed; }
        .opt-chip input { width: 18px; height: 18px; accent-color: #FF6B00; cursor: pointer; }
        .opt-chip.checked { border-color: #FF6B00; background: #fff7ed; font-weight: 600; color: #c2410c; }
        .section-label { font-size: 12px; font-weight: 800; color: #9ca3af; letter-spacing: .03em; margin: 6px 0 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen">

    <header class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-2xl mx-auto px-4 py-2.5 flex justify-between items-center">
            <a href="/home" class="flex items-center gap-3">
                <img src="/assets/Logo.svg" alt="VP Kanniporn FWD" class="h-10 w-auto">
            </a>
            <a id="back-link" href="/home" class="text-xs font-semibold text-gray-500 hover:text-orange-600">← กลับ</a>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">

        <div id="form-card" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-orange-50 text-3xl mb-3">📅</div>
                <h1 class="text-2xl font-extrabold text-gray-800">นัดปรึกษาออนไลน์ฟรี</h1>
                <p class="text-sm text-gray-500 mt-1">เลือกวันและเวลาที่สะดวก ทีมงานจะติดต่อกลับเพื่อยืนยันการนัดหมาย</p>
            </div>

            <form id="appt-form" class="space-y-6" novalidate>

                <!-- ข้อมูลผู้ติดต่อ -->
                <div>
                    <p class="section-label">ข้อมูลผู้ติดต่อ</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5 req">ชื่อ-นามสกุล</label>
                            <input type="text" name="full_name" class="field-input" maxlength="150" placeholder="เช่น สมชาย ใจดี" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5 req">เบอร์โทรศัพท์</label>
                            <input type="tel" name="phone" class="field-input" maxlength="30" placeholder="08X-XXX-XXXX" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">LINE ID <span class="font-normal text-gray-400 text-xs">(ถ้ามี)</span></label>
                            <input type="text" name="line_id" class="field-input" maxlength="64" placeholder="@yourid หรือ line id">
                        </div>
                    </div>
                </div>

                <!-- วันและเวลาที่ต้องการนัด -->
                <div>
                    <p class="section-label">วันและเวลาที่ต้องการนัด</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5 req">เลือกวันนัดหมาย</label>
                            <input type="date" name="appointment_date" id="appt-date" class="field-input" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2 req">เลือกเวลาที่สะดวก</label>
                            <div id="slots" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                        </div>
                    </div>
                </div>

                <!-- ช่องทางการนัดหมาย -->
                <div>
                    <p class="section-label">ช่องทางการนัดหมาย</p>
                    <div id="channels" class="grid grid-cols-2 gap-2"></div>
                </div>

                <!-- Consent -->
                <label class="flex items-start gap-3 p-3 bg-gray-50 rounded-xl cursor-pointer">
                    <input type="checkbox" name="consent" class="mt-1 w-5 h-5 flex-shrink-0" style="accent-color:#FF6B00;" required>
                    <span class="text-xs text-gray-600 leading-relaxed">
                        ข้าพเจ้ายินยอมให้ตัวแทนติดต่อกลับเพื่อยืนยันการนัดหมาย และยินยอมให้เก็บและใช้ข้อมูลส่วนบุคคลเพื่อการให้บริการตามนโยบายความเป็นส่วนตัว
                    </span>
                </label>

                <button type="submit" id="submit-btn"
                        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 rounded-full text-base shadow-lg shadow-orange-500/30 transition disabled:opacity-60">
                    ยืนยันนัดหมาย
                </button>
            </form>
        </div>

        <div id="success-card" class="hidden bg-white rounded-2xl shadow-sm border border-green-100 p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-50 text-4xl mb-4">✅</div>
            <h2 class="text-xl font-extrabold text-gray-800">ส่งคำขอนัดหมายเรียบร้อย</h2>
            <p class="text-sm text-gray-500 mt-2">ทีมงานจะติดต่อกลับเพื่อยืนยันการนัดหมายโดยเร็วที่สุดครับ/ค่ะ</p>
            <a id="success-back" href="/home" class="inline-block mt-6 text-orange-600 font-semibold text-sm">← กลับหน้าตัวแทน</a>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-full text-white text-sm font-semibold opacity-0 pointer-events-none transition-opacity z-50"></div>

    <script>
        const m = location.pathname.match(/^\/appointment\/(\d+)/);
        const agentId = m ? Number(m[1]) : null;

        const SLOTS = [
            { v: '09:00', label: '09:00–10:00 น.' },
            { v: '10:00', label: '10:00–11:00 น.' },
            { v: '13:00', label: '13:00–14:00 น.' },
            { v: '14:00', label: '14:00–15:00 น.' },
            { v: '16:00', label: '16:00–17:00 น.' },
            { v: '19:00', label: '19:00–20:00 น.' },
        ];
        const CHANNELS = [
            { v: 'phone', label: '📞 โทรศัพท์' },
            { v: 'linecall', label: '💬 LINE Call' },
            { v: 'meet', label: '🎥 Google Meet' },
            { v: 'zoom', label: '💻 Zoom' },
        ];

        function toast(msg, ok) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `fixed bottom-5 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-full text-white text-sm font-semibold transition-opacity z-50 ${ok === false ? 'bg-red-600' : 'bg-green-600'} opacity-100`;
            setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); }, 2800);
        }

        // สร้าง radio chips (เลือกได้ 1 ต่อกลุ่ม)
        function buildChips(container, name, items) {
            container.innerHTML = items.map(it => `
                <label class="opt-chip">
                    <input type="radio" name="${name}" value="${it.v}">
                    <span>${it.label}</span>
                </label>`).join('');
            container.querySelectorAll('.opt-chip').forEach(chip => {
                const r = chip.querySelector('input');
                r.addEventListener('change', () => {
                    container.querySelectorAll('.opt-chip').forEach(c => c.classList.remove('checked'));
                    if (r.checked) chip.classList.add('checked');
                });
            });
        }
        buildChips(document.getElementById('slots'), 'time_slot', SLOTS);
        buildChips(document.getElementById('channels'), 'channel', CHANNELS);

        // วันนัดต่ำสุด = พรุ่งนี้
        (function () {
            const d = new Date(); d.setDate(d.getDate() + 1);
            const off = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
            document.getElementById('appt-date').min = off.toISOString().slice(0, 10);
        })();

        async function loadAgent() {
            if (!agentId) return;
            document.getElementById('back-link').href = '/agent/' + agentId;
            document.getElementById('success-back').href = '/agent/' + agentId;
        }

        document.getElementById('appt-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = e.target;
            const btn = document.getElementById('submit-btn');

            const full_name = f.full_name.value.trim();
            const phone = f.phone.value.trim();
            const line_id = f.line_id.value.trim();
            const appointment_date = f.appointment_date.value;
            const slotEl = f.querySelector('input[name="time_slot"]:checked');
            const chEl = f.querySelector('input[name="channel"]:checked');
            const consent = f.consent.checked;

            if (!full_name) return toast('กรุณากรอกชื่อ-นามสกุล', false);
            if (!phone) return toast('กรุณากรอกเบอร์โทรศัพท์', false);
            if (!appointment_date) return toast('กรุณาเลือกวันนัดหมาย', false);
            if (!slotEl) return toast('กรุณาเลือกเวลาที่สะดวก', false);
            if (!chEl) return toast('กรุณาเลือกช่องทางการนัดหมาย', false);
            if (!consent) return toast('กรุณายินยอมก่อนส่งข้อมูล', false);

            btn.disabled = true;
            btn.textContent = 'กำลังส่ง...';
            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: agentId, kind: 'appointment',
                        full_name, phone, line_id,
                        appointment_date, time_slot: slotEl.value, channel: chEl.value, consent,
                    }),
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'ส่งข้อมูลไม่สำเร็จ');
                document.getElementById('form-card').classList.add('hidden');
                document.getElementById('success-card').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                toast(err.message, false);
                btn.disabled = false;
                btn.textContent = 'ยืนยันนัดหมาย';
            }
        });

        loadAgent();
    </script>
</body>
</html>
