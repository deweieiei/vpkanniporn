<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประกัน - FWD Agent Office</title>
    <link rel="icon" type="image/svg+xml" href="/assets/Logo.svg">
    <link rel="shortcut icon" href="/assets/Logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ย่อ-ขยายทุกอย่างสมส่วนตามจอ (มือถือ→iPad→คอม) ผ่าน root font-size — Tailwind ใช้หน่วย rem จึงปรับตามอัตโนมัติ */
        html { font-size: clamp(13px, 0.5vw + 11px, 16px); }
        body { font-family: 'Prompt', sans-serif; }
        .fwd-orange { color: #FF6B00; }
        .fwd-bg-orange { background-color: #FF6B00; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <!-- HEADER -->
    <header class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-4">
                <div class="text-3xl font-black text-slate-800 tracking-wider">FWD</div>
                <div class="border-l-2 border-gray-200 pl-3">
                    <p style="font-size:13px; font-weight:700; color:#E66D18; line-height:1.2;">Agent VP Kanniporn FWD</p>
                    <p style="font-size:11px; color:#6b7280; line-height:1.2; margin-top:2px;">สำนักงานตัวแทนดิจิทัล เสนอโดย ตัวแทนทีมVP กัลณิภรณ์ เอฟ ดับบลิว ดี</p>
                </div>
            </a>
            <a href="/login" class="w-9 h-9 rounded-full fwd-bg-orange text-white flex items-center justify-center font-bold shadow-md hover:bg-orange-600 transition" title="เข้าสู่ระบบ">
                ➔
            </a>
        </div>
    </header>

    <div id="main-nav"></div>
    <script src="/nav.js"></script>

    <main id="main-content" class="max-w-3xl mx-auto px-4 py-8">
        <div id="loading" class="text-center text-xs text-gray-400 py-16">
            <span class="inline-block animate-pulse">⏳ กำลังโหลด…</span>
        </div>
    </main>

    <footer class="bg-slate-900 text-gray-400 text-center py-6 text-xs border-t-4 border-orange-500 mt-10">
        <p>© 2026 FWD Insurance Agent Office</p>
    </footer>

    <script>
        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
                ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }
        // render เป็น plain text เท่านั้น (escape ก่อนเสมอ) ป้องกัน stored XSS
        // จากเนื้อหาที่ตัวแทนกรอกเอง — ไม่ใช้ innerHTML ตรงๆ กับ content_html
        function textToSafeHtml(text) {
            return escapeHtml(text || '').replace(/\n/g, '<br>');
        }

        function initials(first, last) {
            const a = (first || '').trim().charAt(0);
            const b = (last || '').trim().charAt(0);
            return (a + b).toUpperCase() || '?';
        }

        const idMatch = window.location.pathname.match(/^\/plans\/(\d+)/);
        const planId = idMatch ? Number(idMatch[1]) : null;

        async function loadPlan() {
            const main = document.getElementById('main-content');
            if (!planId) {
                main.innerHTML = `<div class="text-center text-gray-400 py-16">ไม่พบแบบประกันนี้ <a href="/plans" class="text-orange-500 hover:underline">← กลับไปดูแบบประกันทั้งหมด</a></div>`;
                return;
            }
            try {
                const res = await fetch(`/api/plans/${planId}`);
                if (!res.ok) {
                    main.innerHTML = `
                        <div class="text-center py-16">
                            <p class="text-4xl mb-3">😔</p>
                            <p class="font-bold text-lg">ไม่พบแบบประกันนี้</p>
                            <a href="/plans" class="text-orange-500 hover:underline text-sm mt-3 inline-block">← กลับไปดูแบบประกันทั้งหมด</a>
                        </div>`;
                    return;
                }
                const data = await res.json();
                renderPlan(data.plan);
            } catch (e) {
                main.innerHTML = `<div class="text-center text-red-400 py-16">โหลดข้อมูลไม่สำเร็จ ลองใหม่อีกครั้ง</div>`;
                console.error(e);
            }
        }

        function renderPlan(p) {
            document.title = `${p.title} - FWD Agent Office`;
            const agentName = escapeHtml(`${p.agent_first_name || ''} ${p.agent_last_name || ''}`.trim() || 'ตัวแทน FWD');
            const cover = p.cover_image
                ? `<img src="${escapeHtml(p.cover_image)}" alt="${escapeHtml(p.title)}" class="w-full h-56 object-cover rounded-2xl mb-6 shadow-sm">`
                : `<div class="w-full h-56 rounded-2xl mb-6 shadow-sm bg-gradient-to-br from-orange-50 to-amber-100 flex items-center justify-center text-6xl">${escapeHtml(p.category_icon || '📄')}</div>`;
            const agentAvatar = p.agent_avatar_path
                ? `<img src="${escapeHtml(p.agent_avatar_path)}" class="w-full h-full object-cover">`
                : `<span class="text-sm font-bold text-orange-500">${initials(p.agent_first_name, p.agent_last_name)}</span>`;

            document.getElementById('main-content').innerHTML = `
                <a href="/plans" class="text-xs text-gray-400 hover:text-orange-500">← กลับไปดูแบบประกันทั้งหมด</a>
                ${cover}
                <span class="inline-block text-xs font-bold text-orange-500 bg-orange-50 px-3 py-1 rounded-full mb-2">
                    ${escapeHtml(p.category_icon || '')} ${escapeHtml(p.category_name || '')}
                </span>
                <h1 class="text-xl md:text-2xl font-bold text-gray-800 mb-2">${escapeHtml(p.title)}</h1>
                ${p.summary ? `<p class="text-sm text-gray-500 mb-6">${escapeHtml(p.summary)}</p>` : ''}
                <div class="prose prose-sm max-w-none text-gray-700 leading-relaxed mb-8">${textToSafeHtml(p.content_html)}</div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex items-center justify-between gap-4">
                    <a href="/agent/${p.user_id}" class="flex items-center gap-3 group">
                        <div class="w-12 h-12 rounded-full border-2 border-amber-300 bg-orange-50 overflow-hidden flex items-center justify-center">
                            ${agentAvatar}
                        </div>
                        <div>
                            <p class="text-sm font-bold text-gray-800 group-hover:text-orange-500 transition">${agentName}</p>
                            <p class="text-[11px] text-gray-400">ดูโปรไฟล์ตัวแทน ➔</p>
                        </div>
                    </a>
                    <a href="/agent/${p.user_id}#contact" class="bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-bold px-5 py-2.5 rounded-full text-xs shadow-md transition whitespace-nowrap">
                        สนใจแบบนี้
                    </a>
                </div>
            `;
        }

        loadPlan();
    </script>

</body>
</html>
