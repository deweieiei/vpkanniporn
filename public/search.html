<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค้นหาตัวแทน - FWD Agent Office</title>
    <link rel="icon" type="image/svg+xml" href="/assets/Logo.svg">
    <link rel="shortcut icon" href="/assets/Logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .fwd-orange { color: #FF6B00; }
        .fwd-bg-orange { background-color: #FF6B00; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <!-- HEADER -->
    <header class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-4">
                <div class="text-3xl font-black text-slate-800 tracking-wider">FWD</div>
                <div class="border-l-2 border-gray-200 pl-3">
                    <p class="font-bold text-sm text-orange-600 leading-tight">Agent VP Kanniporn FWD</p>
                    <p class="text-xs font-semibold text-gray-600 leading-tight">สำนักงานตัวแทนดิจิทัล เสนอโดย ตัวแทนทีมVP กัลณิภรณ์ เอฟ ดับบลิว ดี</p>
                </div>
            </a>
            <a href="/login" class="w-9 h-9 rounded-full fwd-bg-orange text-white flex items-center justify-center font-bold shadow-md hover:bg-orange-600 transition" title="เข้าสู่ระบบ">
                ➔
            </a>
        </div>
    </header>

    <!-- NAV (สร้างโดย /nav.js) -->
    <div id="main-nav"></div>
    <script src="/nav.js"></script>

    <!-- ==================== SEARCH AGENTS ==================== -->
    <section class="max-w-5xl mx-auto px-4 mt-4">
        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-5 md:p-6">
            <div class="text-center mb-5">
                <h3 class="text-base md:text-lg font-bold text-orange-600 flex items-center justify-center gap-2">
                    🔍 ค้นหาตัวแทน
                </h3>
                <p class="text-xs text-gray-500 mt-1">ค้นหาสำนักงานตัวแทนดิจิทัลใกล้คุณ</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input type="text" id="search-name" placeholder="รหัสตัวแทน / ชื่อ-นามสกุล"
                    class="px-4 py-2.5 rounded-lg border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none text-sm transition">
                <select id="search-province"
                    class="px-4 py-2.5 rounded-lg border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none text-sm transition bg-white">
                    <option value="">เลือกจังหวัด</option>
                </select>
                <select id="search-branch"
                    class="px-4 py-2.5 rounded-lg border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none text-sm transition bg-white">
                    <option value="">สาขา</option>
                </select>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-2 mt-4">
                <button id="search-btn" class="w-full sm:w-auto bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-bold px-8 py-2.5 rounded-full text-sm shadow-md transition">
                    🔍 ค้นหา
                </button>
                <button id="search-reset" class="w-full sm:w-auto bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold px-6 py-2.5 rounded-full text-sm transition">
                    ล้างค้นหา
                </button>
            </div>

            <p class="text-xs text-gray-500 mt-5 text-center font-medium">
                ผลการค้นหาตัวแทนดิจิทัล จำนวน <span id="result-count-num" class="text-orange-600 font-bold">0</span> รายการ
            </p>
        </div>

        <!-- Agent Cards Grid -->
        <div class="mt-6 mb-12">
            <div id="agents-loading" class="text-center text-xs text-gray-400 py-8">
                <span class="inline-block animate-pulse">⏳ กำลังโหลดรายชื่อตัวแทน…</span>
            </div>
            <div id="agents-empty" class="hidden text-center text-xs text-gray-400 py-8">
                ไม่พบตัวแทนที่ตรงกับเงื่อนไข
            </div>
            <div id="agents-grid" class="hidden grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-slate-900 text-gray-400 text-center py-6 text-xs border-t-4 border-orange-500">
        <p>© 2026 FWD Insurance Agent Office</p>
    </footer>

    <script>
        const PROVINCES = [
            'กรุงเทพมหานคร','กระบี่','กาญจนบุรี','กาฬสินธุ์','กำแพงเพชร','ขอนแก่น','จันทบุรี','ฉะเชิงเทรา',
            'ชลบุรี','ชัยนาท','ชัยภูมิ','ชุมพร','เชียงราย','เชียงใหม่','ตรัง','ตราด','ตาก','นครนายก',
            'นครปฐม','นครพนม','นครราชสีมา','นครศรีธรรมราช','นครสวรรค์','นนทบุรี','นราธิวาส','น่าน',
            'บึงกาฬ','บุรีรัมย์','ปทุมธานี','ประจวบคีรีขันธ์','ปราจีนบุรี','ปัตตานี','พระนครศรีอยุธยา',
            'พังงา','พัทลุง','พิจิตร','พิษณุโลก','เพชรบุรี','เพชรบูรณ์','แพร่','พะเยา','ภูเก็ต',
            'มหาสารคาม','มุกดาหาร','แม่ฮ่องสอน','ยะลา','ยโสธร','ร้อยเอ็ด','ระนอง','ระยอง','ราชบุรี',
            'ลพบุรี','ลำปาง','ลำพูน','เลย','ศรีสะเกษ','สกลนคร','สงขลา','สตูล','สมุทรปราการ',
            'สมุทรสงคราม','สมุทรสาคร','สระแก้ว','สระบุรี','สิงห์บุรี','สุโขทัย','สุพรรณบุรี',
            'สุราษฎร์ธานี','สุรินทร์','หนองคาย','หนองบัวลำภู','อ่างทอง','อำนาจเจริญ','อุดรธานี',
            'อุตรดิตถ์','อุทัยธานี','อุบลราชธานี'
        ];

        // เติม dropdown จังหวัด
        const provinceSelect = document.getElementById('search-province');
        PROVINCES.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.textContent = p;
            provinceSelect.appendChild(opt);
        });

        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
                ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function initials(first, last) {
            const a = (first || '').trim().charAt(0);
            const b = (last || '').trim().charAt(0);
            return (a + b).toUpperCase() || '?';
        }

        function agentCard(u) {
            const fullName = escapeHtml(`${u.first_name || ''} ${u.last_name || ''}`.trim() || '—');
            const position = escapeHtml(u.position || 'ตัวแทน FWD');
            const branch = u.branch ? `<span class="text-[10px] text-gray-400">📍 ${escapeHtml(u.branch)}</span>` : '';
            const province = u.province ? `<span class="text-[10px] text-gray-400">${escapeHtml(u.province)}</span>` : '';
            const phone = u.phone ? `<span class="text-[10px] text-orange-500 font-medium">📞 ${escapeHtml(u.phone)}</span>` : '';
            const quote = u.quote ? `<p class="text-[10px] text-gray-400 italic line-clamp-2 mt-1">"${escapeHtml(u.quote)}"</p>` : '';
            const avatar = u.avatar_path
                ? `<img src="${escapeHtml(u.avatar_path)}" alt="${fullName}" class="w-full h-full object-cover">`
                : `<span class="text-2xl font-bold text-orange-500">${initials(u.first_name, u.last_name)}</span>`;

            return `
                <a href="/agent/${u.id}" class="group bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col items-center text-center relative overflow-hidden">
                    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-amber-400 via-orange-500 to-orange-600"></div>
                    <div class="w-20 h-20 rounded-full border-4 border-amber-300 bg-orange-50 overflow-hidden flex items-center justify-center mt-2 mb-3 shadow-md group-hover:scale-105 transition">
                        ${avatar}
                    </div>
                    <h4 class="font-bold text-sm text-gray-800">${fullName}</h4>
                    <p class="text-xs text-orange-500 font-semibold mt-0.5">${position}</p>
                    <div class="flex flex-col items-center gap-1 mt-2">
                        ${branch}
                        ${province}
                        ${phone}
                    </div>
                    ${quote}
                    <div class="mt-3 text-[10px] font-bold text-orange-400 group-hover:text-orange-600 flex items-center gap-1">
                        ดูโปรไฟล์ <span class="group-hover:translate-x-1 transition">➔</span>
                    </div>
                </a>
            `;
        }

        let allAgents = [];

        function renderResults(agents) {
            const loading = document.getElementById('agents-loading');
            const empty = document.getElementById('agents-empty');
            const grid = document.getElementById('agents-grid');
            const countEl = document.getElementById('result-count-num');

            loading.classList.add('hidden');
            countEl.textContent = agents.length;

            if (agents.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                grid.innerHTML = agents.map(agentCard).join('');
                grid.classList.remove('hidden');
            }
        }

        function applyFilters() {
            const name = document.getElementById('search-name').value.trim().toLowerCase();
            const province = document.getElementById('search-province').value;
            const branch = document.getElementById('search-branch').value;

            const filtered = allAgents.filter(u => {
                if (province && u.province !== province) return false;
                if (branch && u.branch !== branch) return false;
                if (name) {
                    const fullName = `${u.first_name || ''} ${u.last_name || ''}`.toLowerCase();
                    const license = String(u.license_number || '').toLowerCase();
                    const license2 = String(u.license_number_2 || '').toLowerCase();
                    const id = String(u.id || '');
                    if (!fullName.includes(name) &&
                        !license.includes(name) &&
                        !license2.includes(name) &&
                        id !== name) return false;
                }
                return true;
            });

            renderResults(filtered);
        }

        async function loadAgents() {
            const loading = document.getElementById('agents-loading');
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                allAgents = data.users || [];

                // เติม dropdown สาขา จากข้อมูลจริงในระบบ
                const branchSelect = document.getElementById('search-branch');
                const branches = [...new Set(allAgents.map(u => u.branch).filter(Boolean))].sort();
                branches.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b; opt.textContent = b;
                    branchSelect.appendChild(opt);
                });

                renderResults(allAgents);
            } catch (e) {
                loading.textContent = 'โหลดรายชื่อตัวแทนไม่สำเร็จ';
                console.error(e);
            }
        }
        loadAgents();

        document.getElementById('search-btn').addEventListener('click', applyFilters);
        document.getElementById('search-reset').addEventListener('click', () => {
            document.getElementById('search-name').value = '';
            document.getElementById('search-province').value = '';
            document.getElementById('search-branch').value = '';
            renderResults(allAgents);
        });
        document.getElementById('search-name').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); applyFilters(); }
        });
    </script>

</body>
</html>
