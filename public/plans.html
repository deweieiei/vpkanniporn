    <!-- NAV -->
    <div id="main-nav"></div>
    <script src="/nav.js"></script>

    <section class="max-w-5xl mx-auto px-4 mt-6">
        <div class="text-center mb-6">
            <h1 class="text-xl md:text-2xl font-bold text-gray-800">เลือกแผนที่เหมาะกับคุณ</h1>
            <p class="text-xs md:text-sm text-gray-500 mt-1">แบบประกันจากตัวแทน FWD</p>
        </div>

        <!-- Category tabs -->
        <div id="category-tabs" class="flex flex-wrap justify-center gap-2 mb-8">
            <button data-slug="" class="cat-tab px-4 py-2 rounded-full text-xs font-bold bg-white border border-gray-200 text-gray-600 hover:border-orange-300 transition">
                ทั้งหมด
            </button>
        </div>

        <div id="plans-loading" class="text-center text-xs text-gray-400 py-10">
            <span class="inline-block animate-pulse">⏳ กำลังโหลดแบบประกัน…</span>
        </div>
        <div id="plans-empty" class="hidden text-center text-sm text-gray-400 py-10">
            😔 ยังไม่มีแบบประกันในหมวดนี้ — <a href="/#contact" class="text-orange-500 hover:underline">ติดต่อสอบถามตัวแทนได้เลย</a>
        </div>
        <div id="plans-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 mb-12"></div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-slate-900 text-gray-400 text-center py-6 text-xs border-t-4 border-orange-500 mt-10">
        <p>© 2026 FWD Insurance Agent Office</p>
    </footer>

    <script>
        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
                ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        const params = new URLSearchParams(window.location.search);
        let activeCategory = params.get('category') || '';
        const userId = params.get('user_id') || '';

        function planCard(p) {
            const cover = p.cover_image
                ? `<img src="${escapeHtml(p.cover_image)}" alt="${escapeHtml(p.title)}" class="w-full h-36 object-cover">`
                : `<div class="w-full h-36 bg-gradient-to-br from-orange-50 to-amber-100 flex items-center justify-center text-4xl">${escapeHtml(p.category_icon || '📄')}</div>`;
            const agentName = escapeHtml(`${p.agent_first_name || ''} ${p.agent_last_name || ''}`.trim() || 'ตัวแทน FWD');
            return `
                <a href="/plans/${p.id}" class="group bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col">
                    ${cover}
                    <div class="p-4 flex flex-col flex-1">
                        <span class="text-[10px] font-bold text-orange-500 mb-1">${escapeHtml(p.category_icon || '')} ${escapeHtml(p.category_name || '')}</span>
                        <h3 class="font-bold text-sm text-gray-800 mb-1">${escapeHtml(p.title)}</h3>
                        <p class="text-xs text-gray-500 line-clamp-2 flex-1">${escapeHtml(p.summary || '')}</p>
                        <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-50">
                            <span class="text-[10px] text-gray-400">โดย ${agentName}</span>
                            <span class="text-[10px] font-bold text-orange-400 group-hover:text-orange-600">ดูรายละเอียด ➔</span>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderPlans(plans) {
            document.getElementById('plans-loading').classList.add('hidden');
            const grid = document.getElementById('plans-grid');
            const empty = document.getElementById('plans-empty');
            if (plans.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                grid.innerHTML = plans.map(planCard).join('');
                grid.classList.remove('hidden');
            }
        }

        async function loadPlans() {
            try {
                const qs = new URLSearchParams();
                if (activeCategory) qs.set('category', activeCategory);
                if (userId) qs.set('user_id', userId);
                const res = await fetch(`/api/plans?${qs.toString()}`);
                const data = await res.json();
                renderPlans(data.plans || []);
            } catch (e) {
                document.getElementById('plans-loading').textContent = 'โหลดแบบประกันไม่สำเร็จ';
                console.error(e);
            }
        }

        function setActiveTab() {
            document.querySelectorAll('.cat-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.slug === activeCategory);
            });
        }

        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const data = await res.json();
                const container = document.getElementById('category-tabs');
                (data.categories || []).forEach(c => {
                    const btn = document.createElement('button');
                    btn.dataset.slug = c.slug;
                    btn.className = 'cat-tab px-4 py-2 rounded-full text-xs font-bold bg-white border border-gray-200 text-gray-600 hover:border-orange-300 transition';
                    btn.textContent = `${c.icon || ''} ${c.name}`;
                    container.appendChild(btn);
                });
                setActiveTab();
                container.addEventListener('click', (e) => {
                    const btn = e.target.closest('.cat-tab');
                    if (!btn) return;
                    activeCategory = btn.dataset.slug;
                    const url = new URL(window.location.href);
                    if (activeCategory) url.searchParams.set('category', activeCategory);
                    else url.searchParams.delete('category');
                    window.history.replaceState({}, '', url);
                    setActiveTab();
                    document.getElementById('plans-loading').classList.remove('hidden');
                    document.getElementById('plans-grid').classList.add('hidden');
                    document.getElementById('plans-empty').classList.add('hidden');
                    loadPlans();
                });
            } catch (e) {
                console.error('load categories failed', e);
            }
        }

        setActiveTab();
        loadCategories();
        loadPlans();
    </script>

</body>
