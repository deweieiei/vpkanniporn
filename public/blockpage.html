<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP Kanniporn — FWD Insurance</title>
    <link rel="icon" type="image/svg+xml" href="/assets/Logo2.svg">
    <link rel="stylesheet" href="/assets/icons.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html { font-size: clamp(13px, 0.5vw + 11px, 16px); scroll-behavior: smooth; }
        body { font-family: 'Prompt', sans-serif; }
        .plan-card:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(255,107,0,0.16); }
        .adm-only { display: none; }
        .adm .adm-only { display: block; }
        /* ===== App bar บอกว่ากำลังอยู่ในโหมดแก้ไข (เหมือนหน้าแรก) ===== */
        #adm-bar { position:fixed; top:0; left:0; right:0; z-index:60; height:44px;
                   background:linear-gradient(90deg,#c2410c,#ea580c); color:#fff;
                   display:none; align-items:center; gap:12px; padding:0 14px;
                   font-size:13px; font-weight:700; box-shadow:0 2px 12px rgba(0,0,0,.25); }
        .adm #adm-bar { display:flex; }
        .adm { padding-top:44px; }
        .adm > header { top:44px !important; }
        #adm-bar .sp { flex:1; }
        #adm-bar a { background:rgba(255,255,255,.16); color:#fff; border-radius:8px;
                     padding:5px 12px; font-size:12px; font-weight:700; white-space:nowrap; }
        #adm-bar a:hover { background:rgba(255,255,255,.3); }
        @media (max-width:640px) { #adm-bar .hide-sm { display:none; } }
        .adm .ed { outline:1.5px dotted #fdba74; outline-offset:3px; border-radius:4px; cursor:text; }
        .adm .ed:hover { background:#fff7ed; }
        .adm .ed:focus { outline:2px solid #f97316; background:#fffbf5; }
        /* ข้อความโพส — ขึ้นบรรทัดใหม่ตามที่พิมพ์ (เหมือนโพสของตัวแทน) */
        .post-body { white-space:pre-wrap; line-height:1.9; font-size:.95rem; word-break:break-word; }
        /* เนื้อหาโพสยาวๆ */
        #content-view img { max-width:100%; height:auto; border-radius:12px; margin:10px 0; }
        #content-view h1,#content-view h2,#content-view h3 { font-weight:800; margin:14px 0 6px; }
        #content-view h1 { font-size:1.6rem } #content-view h2 { font-size:1.35rem } #content-view h3 { font-size:1.15rem }
        #content-view p { margin:8px 0; line-height:1.8 }
        #content-view ul,#content-view ol { margin:8px 0 8px 22px; list-style:disc }
        #content-view ol { list-style:decimal }
        #content-view a { color:#ea580c; text-decoration:underline }
        #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:70;
                 background:#16a34a; color:#fff; padding:8px 18px; border-radius:999px; font-size:12.5px;
                 font-weight:600; opacity:0; transition:opacity .25s; pointer-events:none; }
        #toast.on { opacity:1; }
        #toast.err { background:#dc2626; }
        .slot { position:relative; aspect-ratio:16/10; border-radius:10px; overflow:hidden;
                border:2px dashed #fdba74; background:#fff7ed; cursor:pointer; max-width:260px; }
        .slot img { width:100%; height:100%; object-fit:cover; }
        .slot .x { position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%;
                   background:rgba(220,38,38,.92); color:#fff; font-size:12px; line-height:20px; text-align:center; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased">

    <!-- App bar: บอกว่ากำลังอยู่ในโหมดแก้ไข (โผล่เฉพาะ SupperAdmin) -->
    <div id="adm-bar">
        <span id="adm-title">✏️ โหมดแก้ไข — หน้าเนื้อหาบลอค</span>
        <span id="adm-hint" class="hide-sm" style="font-weight:500; opacity:.9;">คลิกที่หัวข้อเพื่อพิมพ์แก้ · เขียนโพสในกล่องด้านล่างแล้วกดบันทึก</span>
        <span class="sp"></span>
        <a href="/">← กลับหน้าเว็บ</a>
    </div>

    <header class="bg-white/95 backdrop-blur shadow-sm sticky top-0 z-50 border-b border-orange-100">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center gap-3">
            <a href="/" class="flex items-center gap-2 flex-shrink-0">
                <img src="/assets/Logo.png" alt="FWD" class="h-9 w-auto">
            </a>
            <nav id="crumb" class="flex-1 text-xs text-gray-500 truncate"></nav>
            <a href="/" class="text-xs font-bold text-gray-500 hover:text-orange-600 flex-shrink-0">← กลับหน้าแรก</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="root" class="text-center text-gray-400 py-20">กำลังโหลด…</div>
    </main>

    <div id="toast"></div>

    <script>
        // ============================================================
        //  หน้าเนื้อหาของบลอค (page_blocks)
        //  โครง: บลอค 1 อัน = หัวข้อ + รูป + บลอคย่อย (กดเข้าไปได้อีก) + โพสยาวๆ
        //  SupperAdmin แก้ได้ตรงๆ / คนทั่วไปดูอย่างเดียว
        // ============================================================
        const ID = Number(location.pathname.split('/').pop());
        let BLOCK = null, CHILDREN = [], IS_ADMIN = false, CRUMB = [];
        // รูปของโพสระหว่างที่กำลังแก้ (ยังไม่กดบันทึก) — แยกจาก BLOCK.data.post_images ที่เซฟแล้ว
        let POST_IMGS = [];

        // ===== ความลึกของหน้า =====
        //   breadcrumb = บลอคแม่ทั้งสาย (ไม่รวมตัวเอง)
        //   ชั้น 1 = ลูกของ "เลือกแผนที่เหมาะกับคุณ" → breadcrumb = [plans]        → สร้างบลอคย่อยได้
        //   ชั้น 2 = ลูกของชั้น 1                     → breadcrumb = [plans, ชั้น1] → หน้าเขียนโพส ไม่มีปุ่มสร้างแล้ว
        const canAddKid = () => CRUMB.length <= 1;

        const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));

        function toast(msg, isErr) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'on' + (isErr ? ' err' : '');
            clearTimeout(t._t); t._t = setTimeout(() => { t.className = ''; }, 2200);
        }
        async function api(url, opt) {
            const r = await fetch(url, opt);
            const j = await r.json().catch(() => ({}));
            if (!r.ok || j.error) throw new Error(j.error || 'บันทึกไม่สำเร็จ');
            return j;
        }
        function ed(bid, key, val, cls, tag) {
            tag = tag || 'span';
            const safe = esc(val || '');
            if (!IS_ADMIN) return `<${tag} class="${cls}">${safe}</${tag}>`;
            return `<${tag} class="${cls} ed" contenteditable="true" data-bid="${bid}" data-key="${key}">${safe}</${tag}>`;
        }

        async function load() {
            try {
                const j = await api('/api/blocks/' + ID);
                IS_ADMIN = !!j.is_admin;
                BLOCK = j.block; CHILDREN = j.children || []; CRUMB = j.breadcrumb || [];
                POST_IMGS = Array.isArray(BLOCK.data.post_images) ? BLOCK.data.post_images.slice() : [];
                document.body.classList.toggle('adm', IS_ADMIN);
                // breadcrumb
                document.getElementById('crumb').innerHTML =
                    CRUMB.map(c => c.type === 'plans'
                        ? `<a href="/#plans" class="hover:text-orange-600">${esc(c.title || 'หน้าแรก')}</a>`
                        : `<a href="/b/${c.id}" class="hover:text-orange-600">${esc(c.title)}</a>`
                    ).concat(`<span class="text-gray-800 font-bold">${esc(BLOCK.data.button_text || '')}</span>`).join(' <span class="text-gray-300">›</span> ');
                // ชั้นในสุด = หน้าเขียนโพส → บอกให้ชัดว่าที่นี่ไม่มีปุ่มสร้างบลอคแล้ว
                document.getElementById('adm-title').textContent =
                    canAddKid() ? '✏️ โหมดแก้ไข — หน้าเนื้อหาบลอค' : '📝 โหมดแก้ไข — หน้าเขียนโพส';
                document.getElementById('adm-hint').textContent =
                    canAddKid() ? 'คลิกที่หัวข้อเพื่อพิมพ์แก้ · กด ＋ เพื่อสร้างบลอคย่อย (สร้างได้อีกชั้นเดียว)'
                                : 'คลิกที่หัวข้อเพื่อพิมพ์แก้ · เขียนโพสในกล่องด้านล่างแล้วกดบันทึก';
                render();
            } catch (e) {
                document.getElementById('root').innerHTML =
                    `<p class="text-gray-400">ไม่พบหน้านี้</p><a href="/" class="text-orange-500 font-bold text-sm">← กลับหน้าแรก</a>`;
            }
        }

        function render() {
            const img = BLOCK.images.find(i => i.slot === 0 && i.variant === 'web');
            const upload = IS_ADMIN ? `
                <div class="adm-only mb-4">
                    <p class="text-[11px] font-bold text-gray-500 mb-1.5">รูปบนปุ่ม</p>
                    <div class="slot" data-up="${BLOCK.id}" data-slot="0" data-variant="web">
                        ${img ? `<img src="${esc(img.path)}"><span class="x" data-del="${BLOCK.id}">×</span>`
                            : `<div class="w-full h-full flex flex-col items-center justify-center text-orange-400">
                                 <span class="text-2xl">＋</span><span class="text-xs font-bold mt-1">ใส่รูป</span></div>`}
                    </div>
                </div>` : '';

            // บลอคย่อย — กดเข้าไปได้อีกไม่จำกัดชั้น
            const kids = CHILDREN.map(c => {
                const ci = c.images && c.images[0];
                return `<a href="/b/${c.id}" class="plan-card bg-white rounded-2xl border border-gray-100 shadow-sm p-4 text-center transition flex flex-col ${c.is_visible ? '' : 'opacity-50'}">
                    <div class="w-14 h-14 mx-auto rounded-full bg-gradient-to-br from-orange-400 to-orange-500 text-white flex items-center justify-center text-2xl shadow-md overflow-hidden">
                        ${ci ? `<img src="${esc(ci.path)}" class="w-full h-full object-cover">` : '📄'}
                    </div>
                    <p class="font-bold text-gray-800 mt-3 flex-1">${esc(c.data.button_text || 'ปุ่มใหม่')}</p>
                    <span class="mt-3 inline-block text-xs font-bold text-white bg-orange-500 px-3 py-1.5 rounded-full">เปิดดู</span>
                </a>`;
            }).join('');
            const addKid = (IS_ADMIN && canAddKid()) ? `<button id="add-kid"
                class="plan-card bg-orange-50 rounded-2xl border-2 border-dashed border-orange-300 p-4 flex flex-col items-center justify-center text-orange-500 hover:bg-orange-100 min-h-[150px]">
                <span class="text-3xl">＋</span><span class="font-bold text-sm mt-1">สร้างบลอคย่อย</span></button>` : '';

            // ===== โพส — ทำให้เหมือนหน้าที่ตัวแทน (user) เขียนโพส (พี่ดิวสั่ง 19 ก.ค.) =====
            //   ของตัวแทน = ข้อความล้วน (textarea) + รูปหลายรูป — ไม่ใช่ rich text
            //   เก็บที่ data.post_text / data.post_images (array ของ url)
            //   ★ data.content ของเดิม (rich text) ยังแสดงอยู่ ไม่ลบทิ้ง จะได้ไม่หายเงียบ
            const postText = BLOCK.data.post_text || '';
            const savedImgs = Array.isArray(BLOCK.data.post_images) ? BLOCK.data.post_images : [];
            const legacy = BLOCK.data.content || '';

            const parts = [];
            if (savedImgs.length) parts.push(postImagesHtml(savedImgs));
            if (postText) parts.push(`<div class="post-body">${esc(postText)}</div>`);
            if (legacy) parts.push(`<div id="content-view">${legacy}</div>`);
            const contentView = parts.length
                ? `<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">${parts.join('')}</div>` : '';

            // ★ กล่องเขียนโพสโผล่เฉพาะ "หน้าสุดท้าย" (ชั้นที่สร้างบลอคย่อยต่อไม่ได้แล้ว)
            //   ชั้นบนๆ เป็นหน้ารวมปุ่มอย่างเดียว ไม่ต้องมีกล่องเขียนโพสให้รก
            const editor = (IS_ADMIN && !canAddKid()) ? `
                <div class="adm-only bg-white rounded-2xl border border-orange-200 shadow-sm p-4 mt-4">
                    <p class="text-xs font-extrabold text-gray-700 mb-0.5">📝 เขียนโพส</p>
                    <p class="text-[10px] text-gray-400 mb-3">ใส่ข้อความและรูป (ไม่บังคับ) — เหมือนหน้าเขียนโพสของตัวแทน</p>

                    <label class="block text-[11px] font-bold text-gray-500 mb-1">ข้อความ</label>
                    <textarea id="post-text" rows="6"
                        class="w-full border border-gray-200 rounded-xl p-3 text-sm leading-7 focus:outline-orange-400"
                        placeholder="เขียนอะไรสักหน่อย... เช่น ข่าวสาร โปรโมชั่น หรือเกร็ดความรู้">${esc(postText)}</textarea>

                    <label class="block text-[11px] font-bold text-gray-500 mt-3 mb-1">รูปประกอบ (ไม่บังคับ — ใส่ได้หลายรูป)</label>
                    <div id="post-images-grid" class="grid grid-cols-3 sm:grid-cols-4 gap-2 mb-2"></div>
                    <button id="add-post-img" class="text-xs font-bold text-orange-600 hover:underline">＋ เพิ่มรูป</button>
                    <p class="text-[10px] text-gray-400 mt-1">เพิ่มได้เรื่อยๆ · กด × บนรูปเพื่อเอาออก · jpg/png/webp สูงสุด 5MB/รูป</p>

                    <div class="flex justify-end mt-3">
                        <button id="save-content" class="text-xs font-bold text-white bg-orange-500 hover:bg-orange-600 px-5 py-2 rounded-full">บันทึกโพส</button>
                    </div>
                </div>` : '';

            document.getElementById('root').innerHTML = `
                <div class="mb-6">
                    ${upload}
                    ${ed(BLOCK.id, 'button_text', BLOCK.data.button_text, 'text-2xl md:text-3xl font-extrabold text-gray-800 block', 'h1')}
                    ${!BLOCK.is_visible ? '<span class="inline-block text-[10px] font-bold text-white bg-gray-500 px-2 py-0.5 rounded-full mt-1">ซ่อนอยู่</span>' : ''}
                    ${IS_ADMIN ? `<div class="adm-only flex items-center gap-3 mt-2">
                        <button id="vis-block" class="text-xs font-bold ${BLOCK.is_visible ? 'text-gray-600' : 'text-orange-600'} hover:underline">
                            ${BLOCK.is_visible ? '👁 กำลังแสดงอยู่ — กดเพื่อซ่อน' : '🚫 ซ่อนอยู่ — กดเพื่อแสดง'}</button>
                        <button id="del-block" class="text-xs font-bold text-red-500 hover:underline">🗑 ลบบลอคนี้</button>
                    </div>` : ''}
                </div>
                ${(CHILDREN.length || addKid) ? `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">${kids}${addKid}</div>` : ''}
                ${contentView}
                ${editor}`;

            renderPostGrid();
        }

        // ===== รูปของโพส =====
        // ที่แสดงให้คนอ่าน (โครงเดียวกับโพสของตัวแทน: รูปเดียวเต็ม / หลายรูปเรียงเป็นตาราง)
        function postImagesHtml(imgs) {
            if (!imgs || !imgs.length) return '';
            if (imgs.length === 1)
                return `<img src="${esc(imgs[0])}" alt="" loading="lazy" class="w-full rounded-xl mb-3">`;
            return `<div class="grid grid-cols-2 gap-2 mb-3">${imgs.map(u =>
                `<img src="${esc(u)}" alt="" loading="lazy" class="w-full h-44 object-cover rounded-xl">`).join('')}</div>`;
        }
        // ช่องรูปในกล่องแก้ไข (มี × เอาออก)
        function renderPostGrid() {
            const g = document.getElementById('post-images-grid');
            if (!g) return;
            g.innerHTML = POST_IMGS.length
                ? POST_IMGS.map((u, i) => `<div class="relative">
                       <img src="${esc(u)}" alt="" class="w-full h-20 object-cover rounded-lg border border-gray-200">
                       <button data-rmimg="${i}" title="เอารูปนี้ออก"
                         class="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-red-500 text-white text-[11px] leading-5">×</button>
                   </div>`).join('')
                : '<p class="col-span-full text-[11px] text-gray-400">ยังไม่มีรูป</p>';
        }

        // ===== แก้ชื่อปุ่มตรงๆ =====
        document.addEventListener('focusin', e => {
            const el = e.target.closest && e.target.closest('.ed[data-bid]');
            if (el) el._was = el.innerText;
        });
        document.addEventListener('focusout', async e => {
            const el = e.target.closest && e.target.closest('.ed[data-bid]');
            if (!el) return;
            const val = el.innerText.trim();
            if (val === (el._was || '').trim()) return;
            try {
                await api('/api/blocks/' + el.dataset.bid, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { [el.dataset.key]: val } }),
                });
                BLOCK.data[el.dataset.key] = val;
                toast('บันทึกแล้ว');
            } catch (err) { toast(err.message, true); el.innerText = el._was || ''; }
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && e.target.classList && e.target.classList.contains('ed')) {
                e.preventDefault(); e.target.blur();
            }
        });

        document.addEventListener('click', async e => {
            if (!IS_ADMIN) return;

            if (e.target.closest('#add-kid')) {
                const name = prompt('ชื่อบลอคย่อยใหม่:', 'บลอคใหม่');
                if (!name) return;
                try {
                    await api('/api/blocks', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: 'page', parent_id: ID, data: { button_text: name } }),
                    });
                    await load(); toast('สร้างบลอคย่อยแล้ว');
                } catch (err) { toast(err.message, true); }
                return;
            }
            if (e.target.closest('#del-block')) {
                if (!confirm('ลบบลอคนี้? บลอคย่อยข้างในและรูปทั้งหมดจะหายไปด้วย กู้คืนไม่ได้')) return;
                try {
                    await api('/api/blocks/' + ID, { method: 'DELETE' });
                    location.href = '/#plans';
                } catch (err) { toast(err.message, true); }
                return;
            }
            // ปิด/เปิดการแสดงบลอคนี้
            if (e.target.closest('#vis-block')) {
                try {
                    await api('/api/blocks/' + ID, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_visible: !BLOCK.is_visible }),
                    });
                    await load();
                    toast(BLOCK.is_visible ? 'แสดงบลอคนี้แล้ว' : 'ซ่อนบลอคนี้แล้ว');
                } catch (err) { toast(err.message, true); }
                return;
            }
            if (e.target.closest('#save-content')) {
                try {
                    await api('/api/blocks/' + ID, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: {
                            post_text: document.getElementById('post-text').value,
                            post_images: POST_IMGS,
                        } }),
                    });
                    await load(); toast('บันทึกโพสแล้ว');
                } catch (err) { toast(err.message, true); }
                return;
            }
            // เอารูปออกจากโพส (ยังไม่ลบไฟล์บนดิสก์ — จะหายจริงตอนกดบันทึก)
            const rm = e.target.closest('[data-rmimg]');
            if (rm) {
                POST_IMGS.splice(Number(rm.dataset.rmimg), 1);
                renderPostGrid();
                toast('เอารูปออกแล้ว — อย่าลืมกดบันทึกโพส');
                return;
            }
            // เพิ่มรูปเข้าโพส (ทีละหลายรูปได้ เหมือนหน้าเขียนโพสของตัวแทน)
            if (e.target.closest('#add-post-img')) {
                const inp = document.createElement('input');
                inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
                inp.onchange = async () => {
                    const files = [...(inp.files || [])];
                    if (!files.length) return;
                    let done = 0;
                    for (const f of files) {
                        const fd = new FormData(); fd.append('image', f);
                        try {
                            const j = await api(`/api/blocks/${ID}/content-image`, { method: 'POST', body: fd });
                            POST_IMGS.push(j.url); done++;
                        } catch (err) { toast(err.message, true); }
                    }
                    renderPostGrid();
                    if (done) toast(`เพิ่มรูป ${done} รูปแล้ว — อย่าลืมกดบันทึกโพส`);
                };
                inp.click();
                return;
            }
            const dl = e.target.closest('[data-del]');
            if (dl) {
                e.preventDefault(); e.stopPropagation();
                try {
                    await api(`/api/blocks/${ID}/image?slot=0&variant=web`, { method: 'DELETE' });
                    await load(); toast('ลบรูปแล้ว');
                } catch (err) { toast(err.message, true); }
                return;
            }
            const up = e.target.closest('[data-up]');
            if (up) {
                const inp = document.createElement('input');
                inp.type = 'file'; inp.accept = 'image/*';
                inp.onchange = async () => {
                    if (!inp.files[0]) return;
                    const fd = new FormData();
                    fd.append('image', inp.files[0]); fd.append('slot', '0'); fd.append('variant', 'web');
                    try {
                        await api(`/api/blocks/${ID}/image`, { method: 'POST', body: fd });
                        await load(); toast('อัปรูปแล้ว');
                    } catch (err) { toast(err.message, true); }
                };
                inp.click();
            }
        });

        load();
    </script>
</body>

</html>
