<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP Kanniporn — FWD Insurance</title>
    <link rel="icon" type="image/svg+xml" href="/assets/Logo2.svg">
    <link rel="stylesheet" href="/assets/icons.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html { font-size: clamp(13px, 0.5vw + 11px, 16px); scroll-behavior: smooth; }
        body { font-family: 'Prompt', sans-serif; }
        .plan-card:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(255,107,0,0.16); }
        .adm-only { display: none; }
        .adm .adm-only { display: block; }
        /* ===== App bar บอกว่ากำลังอยู่ในโหมดแก้ไข (เหมือนหน้าแรก) ===== */
        #adm-bar { position:fixed; top:0; left:0; right:0; z-index:60; height:44px;
                   background:linear-gradient(90deg,#c2410c,#ea580c); color:#fff;
                   display:none; align-items:center; gap:12px; padding:0 14px;
                   font-size:13px; font-weight:700; box-shadow:0 2px 12px rgba(0,0,0,.25); }
        .adm #adm-bar { display:flex; }
        .adm { padding-top:44px; }
        .adm > header { top:44px !important; }
        #adm-bar .sp { flex:1; }
        #adm-bar a { background:rgba(255,255,255,.16); color:#fff; border-radius:8px;
                     padding:5px 12px; font-size:12px; font-weight:700; white-space:nowrap; }
        #adm-bar a:hover { background:rgba(255,255,255,.3); }
        @media (max-width:640px) { #adm-bar .hide-sm { display:none; } }
        .adm .ed { outline:1.5px dotted #fdba74; outline-offset:3px; border-radius:4px; cursor:text; }
        .adm .ed:hover { background:#fff7ed; }
        .adm .ed:focus { outline:2px solid #f97316; background:#fffbf5; }
        /* ===== Rich text — ยกชุดเดียวกับหน้าเขียนของตัวแทน (page.html /page/:id) ===== */
        .rt-content h2, .rt-content h3 { font-weight:700; color:#374151; margin:.9em 0 .4em; }
        .rt-content h2 { font-size:1.35rem; } .rt-content h3 { font-size:1.15rem; }
        .rt-content p { margin:0 0 .8em; }
        .rt-content ul { list-style:disc; padding-left:1.5em; margin:0 0 .8em; }
        .rt-content ol { list-style:decimal; padding-left:1.5em; margin:0 0 .8em; }
        .rt-content li { margin:.2em 0; }
        .rt-content a { color:#ea580c; text-decoration:underline; }
        .rt-content img { max-width:100%; height:auto; border-radius:12px; margin:.6em 0; }
        .rt-content b, .rt-content strong { font-weight:700; }
        .rt-editor { min-height:320px; outline:none; }
        .rt-editor:empty:before { content:attr(data-placeholder); color:#9ca3af; }
        .rt-btn { min-width:34px; height:32px; padding:0 8px; border:1px solid #e5e7eb; background:#fff;
                  border-radius:8px; font-size:13px; color:#374151; cursor:pointer;
                  display:inline-flex; align-items:center; justify-content:center; }
        .rt-btn:hover { background:#fff7ed; border-color:#fdba74; color:#ea580c; }
        .rt-sep { width:1px; align-self:stretch; background:#e5e7eb; margin:2px 4px; }
        /* ===== การ์ดบลอคย่อย — ชุดเดียวกับหน้าแรกและหน้า /page/:id ===== */
        .lf-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
        .lf-card { position:relative; min-height:150px; border-radius:14px; overflow:hidden; cursor:pointer;
                   background-size:cover; background-position:center; display:flex; align-items:center;
                   justify-content:center; box-shadow:0 1px 5px rgba(0,0,0,.10);
                   transition:box-shadow .15s, transform .15s; }
        .lf-card:hover { box-shadow:0 8px 22px rgba(0,0,0,.16); transform:translateY(-2px); }
        .lf-card.lf-noimg { background:linear-gradient(135deg,#ff9a4d,#ff6b00); }
        .lf-shade { position:absolute; inset:0; background:rgba(0,0,0,.34); }
        .lf-card.lf-noimg .lf-shade { background:transparent; }
        .lf-label { position:relative; z-index:1; padding:14px 12px; color:#fff; font-weight:700; font-size:16px;
                    text-align:center; line-height:1.35; text-shadow:0 1px 6px rgba(0,0,0,.55); }
        .lf-tools { position:absolute; top:8px; right:8px; display:flex; gap:6px; z-index:2; }
        .lf-tools button { width:28px; height:28px; border:none; border-radius:50%; background:rgba(255,255,255,.92);
                           font-size:13px; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.2);
                           display:flex; align-items:center; justify-content:center; }
        .lf-edit { color:#ea580c; } .lf-edit:hover { background:#ffedd5; }
        .lf-del { color:#ef4444; }  .lf-del:hover { background:#fee2e2; }
        /* โมดัลแก้การ์ด — ชุดเดียวกับหน้าแรก */
        .modal { position:fixed; inset:0; z-index:80; background:rgba(0,0,0,.5); display:none;
                 align-items:center; justify-content:center; padding:16px; }
        .modal.on { display:flex; }
        .modal-card { background:#fff; border-radius:16px; padding:20px; max-width:440px; width:100%;
                      max-height:90vh; overflow-y:auto; }
        .lf-add { cursor:pointer; border:2px dashed #f0b787; background:#fff8f2; display:flex; flex-direction:column;
                  align-items:center; justify-content:center; min-height:150px; border-radius:14px;
                  color:#ea580c; font-weight:700; gap:6px; transition:background .15s; }
        .lf-add:hover { background:#fff2e6; }
        .lf-add .plus { font-size:30px; line-height:1; }
        .inactive-tag { display:inline-block; margin-left:6px; font-size:10px; font-weight:600; color:#fff;
                        background:rgba(0,0,0,.45); padding:1px 6px; border-radius:8px; vertical-align:middle; }
        #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:70;
                 background:#16a34a; color:#fff; padding:8px 18px; border-radius:999px; font-size:12.5px;
                 font-weight:600; opacity:0; transition:opacity .25s; pointer-events:none; }
        #toast.on { opacity:1; }
        #toast.err { background:#dc2626; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased">

    <!-- App bar: บอกว่ากำลังอยู่ในโหมดแก้ไข (โผล่เฉพาะ SupperAdmin) -->
    <div id="adm-bar">
        <span id="adm-title">✏️ โหมดแก้ไข — หน้าเนื้อหาบลอค</span>
        <span id="adm-hint" class="hide-sm" style="font-weight:500; opacity:.9;">คลิกที่หัวข้อเพื่อพิมพ์แก้ · เขียนโพสในกล่องด้านล่างแล้วกดบันทึก</span>
        <span class="sp"></span>
        <a href="/">← กลับหน้าเว็บ</a>
    </div>

    <header class="bg-white/95 backdrop-blur shadow-sm sticky top-0 z-50 border-b border-orange-100">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center gap-3">
            <a href="/" class="flex items-center gap-2 flex-shrink-0">
                <img src="/assets/Logo.png" alt="FWD" class="h-9 w-auto">
            </a>
            <nav id="crumb" class="flex-1 text-xs text-gray-500 truncate"></nav>
            <a href="/" class="text-xs font-bold text-gray-500 hover:text-orange-600 flex-shrink-0">← กลับหน้าแรก</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="root" class="text-center text-gray-400 py-20">กำลังโหลด…</div>
    </main>

    <div id="toast"></div>

    <!-- โมดัลแก้การ์ดบลอคย่อย (ชุดเดียวกับหน้าแรก) -->
    <div class="modal" id="page-modal">
        <div class="modal-card">
            <h3 class="font-extrabold text-lg mb-1">✏️ แก้ไขการ์ด</h3>
            <p class="text-xs text-gray-500 mb-5">กดที่การ์ดบนหน้าเว็บเพื่อเข้าไปหน้าเนื้อหา</p>
            <label class="block text-xs font-bold text-gray-600 mb-1">ชื่อรายการ *</label>
            <input type="text" id="pg-text" maxlength="120"
                class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm outline-none focus:border-orange-500 mb-4"
                placeholder="เช่น ประกันสุขภาพ">
            <label class="block text-xs font-bold text-gray-600 mb-1">รูปการ์ด (ไม่ใส่ก็ได้ — ใช้เป็นพื้นหลังการ์ด)</label>
            <div class="flex items-center gap-2.5">
                <div class="w-[88px] h-14 rounded-lg overflow-hidden bg-gray-100 flex items-center justify-center flex-shrink-0">
                    <img id="pg-preview" class="hidden w-full h-full object-cover" src="" alt="">
                    <span id="pg-ph" class="text-[11px] text-gray-400">ไม่มีรูป</span>
                </div>
                <input type="file" id="pg-image" accept="image/*" class="text-xs">
            </div>
            <p class="text-[11px] text-gray-400 mt-1.5">แนะนำขนาด <b>800 × 800 px</b> • jpg/png/webp สูงสุด 5MB</p>
            <button id="pg-rmimg" class="text-[11px] font-bold text-red-500 hover:underline mt-1 hidden">เอารูปออก</button>
            <label class="flex items-center gap-2 text-sm mt-4 mb-5 cursor-pointer text-gray-600">
                <input type="checkbox" id="pg-visible" checked>
                แสดงการ์ดนี้ให้ผู้เข้าชมเห็น <span class="text-[11px] text-gray-400">(เอาติ๊กออก = ซ่อน)</span>
            </label>
            <div class="flex justify-end gap-2 pt-4 border-t border-gray-100">
                <button id="pg-cancel" class="px-5 py-2 rounded-full text-sm font-bold text-gray-500 hover:bg-gray-100">ยกเลิก</button>
                <button id="pg-save" class="px-5 py-2 rounded-full text-sm font-bold text-white bg-orange-500 hover:bg-orange-600">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  หน้าเนื้อหาของบลอค (page_blocks)
        //  โครง: บลอค 1 อัน = หัวข้อ + รูป + บลอคย่อย (กดเข้าไปได้อีก) + โพสยาวๆ
        //  SupperAdmin แก้ได้ตรงๆ / คนทั่วไปดูอย่างเดียว
        // ============================================================
        const ID = Number(location.pathname.split('/').pop());
        let BLOCK = null, CHILDREN = [], IS_ADMIN = false, CRUMB = [];

        // ===== ความลึกของหน้า =====
        //   breadcrumb = บลอคแม่ทั้งสาย (ไม่รวมตัวเอง)
        //   ชั้น 1 = ลูกของ "เลือกแผนที่เหมาะกับคุณ" → breadcrumb = [plans]        → สร้างบลอคย่อยได้
        //   ชั้น 2 = ลูกของชั้น 1                     → breadcrumb = [plans, ชั้น1] → หน้าเขียนโพส ไม่มีปุ่มสร้างแล้ว
        const canAddKid = () => CRUMB.length <= 1;

        const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));

        function toast(msg, isErr) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'on' + (isErr ? ' err' : '');
            clearTimeout(t._t); t._t = setTimeout(() => { t.className = ''; }, 2200);
        }
        async function api(url, opt) {
            const r = await fetch(url, opt);
            const j = await r.json().catch(() => ({}));
            if (!r.ok || j.error) throw new Error(j.error || 'บันทึกไม่สำเร็จ');
            return j;
        }
        function ed(bid, key, val, cls, tag) {
            tag = tag || 'span';
            const safe = esc(val || '');
            if (!IS_ADMIN) return `<${tag} class="${cls}">${safe}</${tag}>`;
            return `<${tag} class="${cls} ed" contenteditable="true" data-bid="${bid}" data-key="${key}">${safe}</${tag}>`;
        }

        async function load() {
            try {
                const j = await api('/api/blocks/' + ID);
                IS_ADMIN = !!j.is_admin;
                BLOCK = j.block; CHILDREN = j.children || []; CRUMB = j.breadcrumb || [];
                document.body.classList.toggle('adm', IS_ADMIN);
                // breadcrumb
                document.getElementById('crumb').innerHTML =
                    CRUMB.map(c => c.type === 'plans'
                        ? `<a href="/#plans" class="hover:text-orange-600">${esc(c.title || 'หน้าแรก')}</a>`
                        : `<a href="/b/${c.id}" class="hover:text-orange-600">${esc(c.title)}</a>`
                    ).concat(`<span class="text-gray-800 font-bold">${esc(BLOCK.data.button_text || '')}</span>`).join(' <span class="text-gray-300">›</span> ');
                // ชั้นในสุด = หน้าเขียนโพส → บอกให้ชัดว่าที่นี่ไม่มีปุ่มสร้างบลอคแล้ว
                document.getElementById('adm-title').textContent =
                    canAddKid() ? '✏️ โหมดแก้ไข — หน้าเนื้อหาบลอค' : '📝 โหมดแก้ไข — หน้าเขียนโพส';
                document.getElementById('adm-hint').textContent =
                    canAddKid() ? 'คลิกที่หัวข้อเพื่อพิมพ์แก้ · กด ＋ เพื่อสร้างบลอคย่อย (สร้างได้อีกชั้นเดียว)'
                                : 'คลิกที่หัวข้อเพื่อพิมพ์แก้ · เขียนโพสในกล่องด้านล่างแล้วกดบันทึก';
                render();
            } catch (e) {
                document.getElementById('root').innerHTML =
                    `<p class="text-gray-400">ไม่พบหน้านี้</p><a href="/" class="text-orange-500 font-bold text-sm">← กลับหน้าแรก</a>`;
            }
        }

        function render() {
            // หมายเหตุ: ช่อง "รูปบนปุ่ม" เดิมตรงนี้เอาออกแล้ว (พี่ดิวสั่ง 19 ก.ค.)
            //   ไม่จำเป็นแล้ว เพราะรูปของการ์ดแก้ได้จากปุ่ม ✏️ บนการ์ดในหน้าแม่โดยตรง

            // บลอคย่อย — การ์ด + เครื่องมือ ชุดเดียวกับหน้าแรกเป๊ะ (พี่ดิวสั่ง: /b/29 ขอแบบเดียวกัน)
            const kids = CHILDREN.map(c => {
                const ci = (c.images || []).find(i => i.slot === 0 && i.variant === 'web') || (c.images || [])[0];
                const style = ci ? ` style="background-image:url('${esc(ci.path)}')"` : '';
                const hid = IS_ADMIN && !c.is_visible ? '<span class="inactive-tag">ซ่อนอยู่</span>' : '';
                const tools = IS_ADMIN ? `<div class="lf-tools">
                        <button type="button" class="lf-edit" data-editpage="${c.id}" title="แก้ไข">✏️</button>
                        <button type="button" class="lf-del" data-delpage="${c.id}" title="ลบ">🗑</button>
                    </div>` : '';
                return `<div class="lf-card${ci ? '' : ' lf-noimg'}" data-openpage="${c.id}"${style}>
                    ${tools}
                    <div class="lf-shade"></div>
                    <div class="lf-label">${esc(c.data.button_text || 'ปุ่มใหม่')}${hid}</div>
                </div>`;
            }).join('');
            const addKid = (IS_ADMIN && canAddKid()) ? `<div id="add-kid" class="lf-add">
                <span class="plus">＋</span><span class="text-sm">สร้างบลอคย่อย</span></div>` : '';

            // ===== โพส — ใช้ตัวแก้ไขชุดเดียวกับหน้า /page/:id ของตัวแทน (พี่ดิวสั่ง 19 ก.ค.) =====
            //   B I U / H2 H3 / ขนาดตัวอักษร / รายการ / จัดชิด / ลิงก์ / แทรกรูป
            //   เก็บเป็น HTML ที่ data.content เหมือนเดิม (เซิร์ฟเวอร์ sanitize ให้อยู่แล้ว)
            const content = BLOCK.data.content || '';
            const contentView = content
                ? `<div id="content-view" class="rt-content bg-white rounded-2xl border border-gray-100 shadow-sm p-6">${content}</div>` : '';

            // ★ กล่องเขียนโพสโผล่เฉพาะ "หน้าสุดท้าย" (ชั้นที่สร้างบลอคย่อยต่อไม่ได้แล้ว)
            //   ชั้นบนๆ เป็นหน้ารวมปุ่มอย่างเดียว ไม่ต้องมีกล่องเขียนโพสให้รก
            const editor = (IS_ADMIN && !canAddKid()) ? `
                <div class="adm-only bg-white rounded-2xl border border-orange-200 shadow-sm p-4 md:p-6 mt-4">
                    <p class="text-xs font-extrabold text-gray-700 mb-3">📝 เขียนโพส</p>
                    <div id="rt-toolbar" class="flex flex-wrap items-center gap-1 mb-3 pb-3 border-b border-gray-100">
                        <button type="button" class="rt-btn" data-cmd="bold" title="ตัวหนา"><b>B</b></button>
                        <button type="button" class="rt-btn" data-cmd="italic" title="ตัวเอียง"><i>I</i></button>
                        <button type="button" class="rt-btn" data-cmd="underline" title="ขีดเส้นใต้"><u>U</u></button>
                        <span class="rt-sep"></span>
                        <button type="button" class="rt-btn" data-block="h2" title="หัวข้อใหญ่">H2</button>
                        <button type="button" class="rt-btn" data-block="h3" title="หัวข้อรอง">H3</button>
                        <button type="button" class="rt-btn" data-block="p" title="ข้อความปกติ">ข้อความ</button>
                        <span class="rt-sep"></span>
                        <span class="inline-flex items-center gap-1" title="เลือกข้อความก่อน แล้วพิมพ์ขนาด (px)">
                            <span class="text-[11px] text-gray-500">ขนาด</span>
                            <input type="number" id="rt-fontsize" min="8" max="120" placeholder="เช่น 24"
                                class="w-16 h-8 px-2 border border-gray-200 rounded-lg text-sm outline-none focus:border-orange-500">
                            <button type="button" class="rt-btn" id="rt-fontsize-apply" title="ตั้งขนาดตัวอักษร">ตั้ง</button>
                        </span>
                        <span class="rt-sep"></span>
                        <button type="button" class="rt-btn" data-cmd="insertUnorderedList" title="รายการหัวข้อ">• รายการ</button>
                        <button type="button" class="rt-btn" data-cmd="insertOrderedList" title="รายการตัวเลข">1. รายการ</button>
                        <span class="rt-sep"></span>
                        <button type="button" class="rt-btn" data-cmd="justifyLeft" title="ชิดซ้าย">⬅</button>
                        <button type="button" class="rt-btn" data-cmd="justifyCenter" title="กึ่งกลาง">↔</button>
                        <span class="rt-sep"></span>
                        <button type="button" class="rt-btn" id="rt-link" title="ใส่ลิงก์">🔗 ลิงก์</button>
                        <button type="button" class="rt-btn" id="rt-image" title="ใส่รูปในเนื้อหา">🖼️ รูป</button>
                        <button type="button" class="rt-btn" data-cmd="removeFormat" title="ล้างรูปแบบ">✖ ล้าง</button>
                    </div>
                    <div id="rt-editor" class="rt-editor rt-content border border-gray-200 rounded-lg p-4"
                         contenteditable="true" data-placeholder="พิมพ์เนื้อหาที่นี่... ใช้ปุ่มด้านบนจัดตัวหนา หัวข้อ ใส่รูปได้"></div>
                    <div class="flex items-center justify-between mt-2">
                        <p class="text-[11px] text-gray-400">💡 เลือกข้อความก่อนกดปุ่มจัดรูปแบบ • กด 🖼️ เพื่อแทรกรูปในเนื้อหา</p>
                        <button id="save-content" class="text-xs font-bold text-white bg-orange-500 hover:bg-orange-600 px-5 py-2 rounded-full flex-shrink-0">บันทึกโพส</button>
                    </div>
                </div>` : '';

            document.getElementById('root').innerHTML = `
                <div class="mb-6">
                    ${ed(BLOCK.id, 'button_text', BLOCK.data.button_text, 'text-2xl md:text-3xl font-extrabold text-gray-800 block', 'h1')}
                    ${!BLOCK.is_visible ? '<span class="inline-block text-[10px] font-bold text-white bg-gray-500 px-2 py-0.5 rounded-full mt-1">ซ่อนอยู่</span>' : ''}
                    ${IS_ADMIN ? `<div class="adm-only flex items-center gap-3 mt-2">
                        <button id="vis-block" class="text-xs font-bold ${BLOCK.is_visible ? 'text-gray-600' : 'text-orange-600'} hover:underline">
                            ${BLOCK.is_visible ? '👁 กำลังแสดงอยู่ — กดเพื่อซ่อน' : '🚫 ซ่อนอยู่ — กดเพื่อแสดง'}</button>
                        <button id="del-block" class="text-xs font-bold text-red-500 hover:underline">🗑 ลบบลอคนี้</button>
                    </div>` : ''}
                </div>
                ${(CHILDREN.length || addKid) ? `<div class="lf-grid mb-6">${kids}${addKid}</div>` : ''}
                ${contentView}
                ${editor}`;

            const rt = document.getElementById('rt-editor');
            if (rt) rt.innerHTML = content;
        }

        // ===== โมดัลแก้การ์ดบลอคย่อย (ยกมาจากหน้าแรก ให้ทำงานเหมือนกันเป๊ะ) =====
        let pgId = null, pgHadImg = false, pgRemove = false;
        function openPageModal(id) {
            const c = CHILDREN.find(x => x.id === id);
            if (!c) return;
            pgId = id; pgRemove = false;
            const img = (c.images || []).find(i => i.slot === 0 && i.variant === 'web') || (c.images || [])[0];
            pgHadImg = !!img;
            document.getElementById('pg-text').value = c.data.button_text || '';
            document.getElementById('pg-visible').checked = !!c.is_visible;
            document.getElementById('pg-image').value = '';
            const pv = document.getElementById('pg-preview'), ph = document.getElementById('pg-ph');
            if (img) { pv.src = img.path; pv.classList.remove('hidden'); ph.classList.add('hidden'); }
            else { pv.src = ''; pv.classList.add('hidden'); ph.classList.remove('hidden'); }
            document.getElementById('pg-rmimg').classList.toggle('hidden', !img);
            document.getElementById('page-modal').classList.add('on');
        }
        document.getElementById('pg-image').addEventListener('change', e => {
            const f = e.target.files && e.target.files[0];
            if (!f) return;
            pgRemove = false;
            const pv = document.getElementById('pg-preview');
            pv.src = URL.createObjectURL(f); pv.classList.remove('hidden');
            document.getElementById('pg-ph').classList.add('hidden');
            document.getElementById('pg-rmimg').classList.remove('hidden');
        });
        document.getElementById('pg-rmimg').onclick = () => {
            pgRemove = true;
            document.getElementById('pg-image').value = '';
            document.getElementById('pg-preview').classList.add('hidden');
            document.getElementById('pg-ph').classList.remove('hidden');
            document.getElementById('pg-rmimg').classList.add('hidden');
        };
        document.getElementById('pg-cancel').onclick = () => document.getElementById('page-modal').classList.remove('on');
        document.getElementById('page-modal').onclick = e => {
            if (e.target.id === 'page-modal') e.target.classList.remove('on');
        };
        document.getElementById('pg-save').onclick = async () => {
            const name = document.getElementById('pg-text').value.trim();
            if (!name) { toast('ใส่ชื่อรายการก่อน', true); return; }
            const vis = document.getElementById('pg-visible').checked;
            const file = document.getElementById('pg-image').files[0];
            try {
                await api('/api/blocks/' + pgId, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { button_text: name }, is_visible: vis }),
                });
                if (file) {
                    const fd = new FormData();
                    fd.append('image', file); fd.append('slot', '0'); fd.append('variant', 'web');
                    await api(`/api/blocks/${pgId}/image`, { method: 'POST', body: fd });
                } else if (pgRemove && pgHadImg) {
                    await api(`/api/blocks/${pgId}/image?slot=0&variant=web`, { method: 'DELETE' });
                }
                document.getElementById('page-modal').classList.remove('on');
                await load(); toast('บันทึกแล้ว');
            } catch (err) { toast(err.message, true); }
        };

        // ============================================================
        //  Rich text toolbar — ยกวิธีเดียวกับหน้า /page/:id ของตัวแทน
        //  ★ ผูก listener ไว้ที่ document เพราะ render() วาดกล่องใหม่ทุกครั้งที่ load()
        //    (ถ้าไปผูกที่ปุ่มตรงๆ แบบ page.html ปุ่มจะตายทันทีที่หน้าวาดใหม่)
        // ============================================================
        const rtEd = () => document.getElementById('rt-editor');
        function exec(cmd, val) { document.execCommand(cmd, false, val || null); const e = rtEd(); if (e) e.focus(); }

        // จำตำแหน่ง cursor ไว้ เผื่อโฟกัสหลุดตอนกดปุ่ม/เลือกไฟล์
        let savedRange = null;
        function saveSel() {
            const ed = rtEd(); if (!ed) return;
            const sel = window.getSelection();
            if (sel.rangeCount && ed.contains(sel.anchorNode)) savedRange = sel.getRangeAt(0);
        }
        function restoreSel() {
            const ed = rtEd(); if (!ed) return;
            ed.focus();
            if (savedRange) { const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange); }
        }
        document.addEventListener('keyup', e => { if (e.target.id === 'rt-editor') saveSel(); });
        document.addEventListener('mouseup', e => { if (e.target.closest && e.target.closest('#rt-editor')) saveSel(); });

        function applyFontSize(px) {
            const p = parseInt(px, 10);
            if (!p || p < 6 || p > 200) { toast('ใส่ตัวเลขขนาด 6–200', true); return; }
            restoreSel();
            const sel = window.getSelection();
            if (!sel.rangeCount || sel.isCollapsed) { toast('เลือกข้อความที่จะปรับขนาดก่อน', true); return; }
            // ใช้ fontSize=7 เป็นตัวจับ แล้วแปลง <font size=7> เป็น <span style="font-size:...">
            document.execCommand('styleWithCSS', false, false);
            document.execCommand('fontSize', false, '7');
            rtEd().querySelectorAll('font[size="7"]').forEach(f => {
                const span = document.createElement('span');
                span.style.fontSize = p + 'px';
                while (f.firstChild) span.appendChild(f.firstChild);
                f.replaceWith(span);
            });
            rtEd().focus(); saveSel();
            toast('ตั้งขนาด ' + p + 'px แล้ว');
        }

        // ===== แก้ชื่อปุ่มตรงๆ =====
        document.addEventListener('focusin', e => {
            const el = e.target.closest && e.target.closest('.ed[data-bid]');
            if (el) el._was = el.innerText;
        });
        document.addEventListener('focusout', async e => {
            const el = e.target.closest && e.target.closest('.ed[data-bid]');
            if (!el) return;
            const val = el.innerText.trim();
            if (val === (el._was || '').trim()) return;
            try {
                await api('/api/blocks/' + el.dataset.bid, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { [el.dataset.key]: val } }),
                });
                BLOCK.data[el.dataset.key] = val;
                toast('บันทึกแล้ว');
            } catch (err) { toast(err.message, true); el.innerText = el._was || ''; }
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && e.target.classList && e.target.classList.contains('ed')) {
                e.preventDefault(); e.target.blur();
            }
            // กด Enter ในช่องขนาดตัวอักษร = กดปุ่ม "ตั้ง"
            if (e.key === 'Enter' && e.target.id === 'rt-fontsize') {
                e.preventDefault(); applyFontSize(e.target.value);
            }
        });

        // กดที่การ์ดบลอคย่อย = เข้าไปหน้านั้น (ทุกคนกดได้) — ยกเว้นกดโดนปุ่ม ✏️ 🗑
        document.addEventListener('click', e => {
            const card = e.target.closest && e.target.closest('[data-openpage]');
            if (!card || e.target.closest('.lf-tools')) return;
            location.href = '/b/' + card.dataset.openpage;
        });

        document.addEventListener('click', async e => {
            if (!IS_ADMIN) return;

            // ✏️ แก้การ์ดบลอคย่อย (ไม่ต้องกดเข้าไปในหน้า)
            const ep = e.target.closest('[data-editpage]');
            if (ep) { openPageModal(Number(ep.dataset.editpage)); return; }
            // 🗑 ลบการ์ดบลอคย่อย
            const dp = e.target.closest('[data-delpage]');
            if (dp) {
                if (!confirm('ลบการ์ดนี้? หน้าเนื้อหาข้างใน บลอคย่อย และรูปทั้งหมดจะหายไปด้วย กู้คืนไม่ได้')) return;
                try { await api('/api/blocks/' + dp.dataset.delpage, { method: 'DELETE' }); await load(); toast('ลบการ์ดแล้ว'); }
                catch (err) { toast(err.message, true); }
                return;
            }

            if (e.target.closest('#add-kid')) {
                const name = prompt('ชื่อบลอคย่อยใหม่:', 'บลอคใหม่');
                if (!name) return;
                try {
                    await api('/api/blocks', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: 'page', parent_id: ID, data: { button_text: name } }),
                    });
                    await load(); toast('สร้างบลอคย่อยแล้ว');
                } catch (err) { toast(err.message, true); }
                return;
            }
            if (e.target.closest('#del-block')) {
                if (!confirm('ลบบลอคนี้? บลอคย่อยข้างในและรูปทั้งหมดจะหายไปด้วย กู้คืนไม่ได้')) return;
                try {
                    await api('/api/blocks/' + ID, { method: 'DELETE' });
                    location.href = '/#plans';
                } catch (err) { toast(err.message, true); }
                return;
            }
            // ปิด/เปิดการแสดงบลอคนี้
            if (e.target.closest('#vis-block')) {
                try {
                    await api('/api/blocks/' + ID, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_visible: !BLOCK.is_visible }),
                    });
                    await load();
                    toast(BLOCK.is_visible ? 'แสดงบลอคนี้แล้ว' : 'ซ่อนบลอคนี้แล้ว');
                } catch (err) { toast(err.message, true); }
                return;
            }
            if (e.target.closest('#save-content')) {
                try {
                    await api('/api/blocks/' + ID, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: { content: rtEd().innerHTML } }),
                    });
                    await load(); toast('บันทึกโพสแล้ว');
                } catch (err) { toast(err.message, true); }
                return;
            }
            // ===== ปุ่มบนแถบเครื่องมือ =====
            if (e.target.closest('#rt-fontsize-apply')) {
                applyFontSize(document.getElementById('rt-fontsize').value); return;
            }
            if (e.target.closest('#rt-link')) {
                const url = prompt('ใส่ลิงก์ (เช่น https://...)');
                if (!url) return;
                restoreSel(); exec('createLink', url); saveSel();
                return;
            }
            if (e.target.closest('#rt-image')) {
                const inp = document.createElement('input');
                inp.type = 'file'; inp.accept = 'image/*';
                inp.onchange = async () => {
                    if (!inp.files[0]) return;
                    const fd = new FormData(); fd.append('image', inp.files[0]);
                    try {
                        const j = await api(`/api/blocks/${ID}/content-image`, { method: 'POST', body: fd });
                        restoreSel();
                        document.execCommand('insertHTML', false, `<img src="${esc(j.url)}" alt="">`);
                        saveSel();
                        toast('แทรกรูปแล้ว — อย่าลืมกดบันทึกโพส');
                    } catch (err) { toast(err.message, true); }
                };
                inp.click();
                return;
            }
            const rtb = e.target.closest('#rt-toolbar button');
            if (rtb) {
                if (rtb.dataset.cmd) { exec(rtb.dataset.cmd); saveSel(); return; }
                if (rtb.dataset.block) { exec('formatBlock', '<' + rtb.dataset.block + '>'); saveSel(); return; }
                return;
            }
        });

        load();
    </script>
</body>

</html>
