<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการผู้ติดต่อสอบถาม — VP Kanniporn FWD</title>
    <link rel="icon" type="image/svg+xml" href="/assets/Logo.svg">
    <link rel="shortcut icon" href="/assets/Logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* ย่อ-ขยายทุกอย่างสมส่วนตามจอ (มือถือ→iPad→คอม) ผ่าน root font-size — Tailwind ใช้หน่วย rem จึงปรับตามอัตโนมัติ */
        html {
            font-size: clamp(13px, 0.5vw + 11px, 16px);
        }

        body {
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased min-h-screen">

    <!-- HEADER -->
    <header class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 py-2.5 flex justify-between items-center">
            <a href="/profile" class="flex items-center gap-3">
                <img src="/assets/Logo.svg" alt="VP Kanniporn FWD" class="h-10 w-auto">
                <div class="border-l-2 border-gray-200 pl-3 hidden sm:block">
                    <p style="font-size:13px; font-weight:700; color:#E66D18; line-height:1.2;">Agent VP Kanniporn FWD
                    </p>
                    <p style="font-size:11px; color:#6b7280; line-height:1.2; margin-top:2px;">สำนักงานตัวแทนดิจิทัล
                        เสนอโดย ตัวแทนทีมVP กัลณิภรณ์ เอฟ ดับบลิว ดี</p>
                </div>
            </a>

        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8">
        <div class="flex items-end justify-between flex-wrap gap-2 mb-5">
            <div>
                <h1 class="text-2xl font-extrabold text-gray-800">รายการผู้ติดต่อสอบถาม</h1>
                <p id="summary" class="text-sm text-gray-500 mt-1">กำลังโหลด…</p>
            </div>
        </div>

        <div id="loading" class="text-center text-gray-400 py-16 text-sm">⏳ กำลังโหลด…</div>

        <div id="empty" class="hidden text-center py-16">
            <p class="text-4xl mb-3">📭</p>
            <p class="font-bold text-lg text-gray-700">ยังไม่มีผู้ติดต่อเข้ามา</p>
            <p class="text-sm text-gray-400 mt-1">เมื่อมีลูกค้ากรอกฟอร์มติดต่อ รายการจะแสดงที่นี่</p>
        </div>

        <div id="list" class="space-y-3"></div>
    </main>

    <!-- DETAIL MODAL -->
    <div id="detail-modal" class="fixed inset-0 bg-black/55 z-[5000] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
            <div
                class="flex items-center justify-between p-5 border-b border-gray-100 sticky top-0 bg-white rounded-t-2xl">
                <h2 class="text-lg font-bold">รายละเอียดผู้ติดต่อ</h2>
                <button id="detail-close"
                    class="w-8 h-8 rounded-full hover:bg-gray-100 text-gray-500 text-xl">✕</button>
            </div>
            <div id="detail-body" class="p-5 space-y-4"></div>
        </div>
    </div>

    <div id="toast"
        class="fixed bottom-5 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-full text-white text-sm font-semibold opacity-0 pointer-events-none transition-opacity z-[6000]">
    </div>

    <script>
        let inquiries = [];

        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        function toast(msg, ok) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `fixed bottom-5 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-full text-white text-sm font-semibold transition-opacity z-[6000] ${ok === false ? 'bg-red-600' : 'bg-green-600'} opacity-100`;
            setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); }, 2600);
        }
        function fmtDateTime(v) {
            if (!v) return '-';
            const d = new Date(v);
            if (isNaN(d)) return '-';
            return d.toLocaleString('th-TH', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        function fmtDate(v) {
            if (!v) return '-';
            const d = new Date(v);
            if (isNaN(d)) return String(v);
            return d.toLocaleDateString('th-TH', { day: '2-digit', month: 'long', year: 'numeric' });
        }
        // วันเวลานัดหมาย — โชว์วัน (มีชื่อวัน) ให้เด่น
        function fmtAppt(v) {
            if (!v) return '-';
            const d = new Date(v);
            if (isNaN(d)) return '-';
            return d.toLocaleString('th-TH', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' น.';
        }
        function purposesArr(p) {
            if (Array.isArray(p)) return p;
            if (typeof p === 'string') { try { const a = JSON.parse(p); return Array.isArray(a) ? a : []; } catch { return []; } }
            return [];
        }
        function telHref(phone) { return 'tel:' + String(phone || '').replace(/[^0-9+]/g, ''); }

        async function load() {
            try {
                const res = await fetch('/api/contact/mine', { credentials: 'same-origin' });
                if (res.status === 401) { window.location.href = '/login'; return; }
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'โหลดไม่สำเร็จ');
                inquiries = d.inquiries || [];
                render(d.total || inquiries.length, d.new_count || 0);
            } catch (e) {
                document.getElementById('loading').classList.add('hidden');
                toast('โหลดข้อมูลไม่สำเร็จ', false);
            }
        }

        function render(total, newCount) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('summary').textContent = `ทั้งหมด ${total} รายการ` + (newCount > 0 ? ` • ใหม่ ${newCount} รายการ` : '');
            const list = document.getElementById('list');
            if (inquiries.length === 0) { document.getElementById('empty').classList.remove('hidden'); list.innerHTML = ''; return; }
            document.getElementById('empty').classList.add('hidden');
            list.innerHTML = inquiries.map(rowHtml).join('');
        }

        function rowHtml(q) {
            const isNew = q.contacted_at == null;
            const isAppt = q.kind === 'appointment' && q.appointment_at;
            const badge = isNew
                ? '<span class="text-[11px] font-bold text-white bg-red-500 px-2 py-0.5 rounded-full">ใหม่</span>'
                : '<span class="text-[11px] font-semibold text-green-700 bg-green-100 px-2 py-0.5 rounded-full">ติดต่อกลับแล้ว</span>';
            const apptBadge = isAppt ? '<span class="text-[11px] font-bold text-white bg-indigo-500 px-2 py-0.5 rounded-full">📅 นัดหมาย</span>' : '';
            const apptLine = isAppt
                ? `<p class="text-sm font-extrabold text-indigo-700 bg-indigo-50 border border-indigo-200 rounded-lg px-3 py-1.5 mt-1.5">📅 ให้ติดต่อกลับ: ${fmtAppt(q.appointment_at)}</p>` : '';
            const purposes = purposesArr(q.purposes).slice(0, 3).map(p => {
                const label = (p === 'อื่นๆ' && q.purpose_other) ? ('อื่นๆ: ' + q.purpose_other) : p;
                return `<span class="text-[11px] bg-orange-50 text-orange-700 px-2 py-0.5 rounded-full">${escapeHtml(label)}</span>`;
            }).join(' ');
            return `
                <div class="bg-white rounded-xl border ${isAppt ? 'border-indigo-300' : (isNew ? 'border-red-200' : 'border-gray-100')} shadow-sm p-4 flex items-center gap-3 cursor-pointer hover:shadow-md transition" data-id="${q.id}">
                    <div class="w-11 h-11 rounded-full ${isAppt ? 'bg-indigo-50 text-indigo-500' : 'bg-orange-50 text-orange-500'} flex items-center justify-center font-bold flex-shrink-0">${escapeHtml((q.full_name || '?').trim().charAt(0) || '?')}</div>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 flex-wrap">
                            <p class="font-bold text-gray-800 truncate">${escapeHtml(q.full_name)}</p>
                            ${apptBadge}${badge}
                        </div>
                        <p class="text-xs text-gray-500 mt-0.5">📞 ${escapeHtml(q.phone)} • ส่งเมื่อ ${fmtDateTime(q.created_at)}</p>
                        ${apptLine}
                        <div class="flex flex-wrap gap-1 mt-1.5">${purposes}</div>
                    </div>
                    <span class="text-gray-300 text-xl flex-shrink-0">›</span>
                </div>`;
        }

        // เปิดรายละเอียด
        document.getElementById('list').addEventListener('click', (e) => {
            const row = e.target.closest('[data-id]');
            if (!row) return;
            openDetail(Number(row.dataset.id));
        });

        function detailRow(label, value) {
            return `<div><p class="text-xs font-bold text-gray-400">${label}</p><p class="text-sm text-gray-800 mt-0.5">${value}</p></div>`;
        }

        function openDetail(id) {
            const q = inquiries.find(x => x.id === id);
            if (!q) return;
            const isNew = q.contacted_at == null;
            const purposes = purposesArr(q.purposes).map(p => {
                const label = (p === 'อื่นๆ' && q.purpose_other) ? ('อื่นๆ: ' + q.purpose_other) : p;
                return `<span class="text-xs bg-orange-50 text-orange-700 px-2.5 py-1 rounded-full">${escapeHtml(label)}</span>`;
            }).join(' ') || '<span class="text-sm text-gray-400">-</span>';
            const contactedLine = q.contacted_at
                ? `<p class="text-xs text-green-700 mt-1">✔ ติดต่อกลับแล้วเมื่อ ${fmtDateTime(q.contacted_at)}</p>` : '';
            const isAppt = q.kind === 'appointment';
            const apptBox = (isAppt && q.appointment_at)
                ? `<div class="bg-indigo-50 border border-indigo-200 rounded-xl p-3 text-center">
                       <p class="text-xs font-bold text-indigo-500">📅 นัดหมาย (${escapeHtml(q.channel || '')})</p>
                       <p class="text-lg font-extrabold text-indigo-800 mt-0.5">${fmtAppt(q.appointment_at)}</p>
                   </div>` : '';
            // ฟิลด์กลาง: โหมดนัดหมาย vs โหมดติดต่อ
            const midFields = isAppt
                ? `${q.line_id ? detailRow('LINE ID', escapeHtml(q.line_id)) : ''}
                   ${detailRow('ช่วงเวลาที่เลือก', escapeHtml(q.time_slot) || '-')}
                   ${detailRow('ช่องทางการนัดหมาย', escapeHtml(q.channel) || '-')}`
                : `${detailRow('วันเดือนปีเกิด', fmtDate(q.birthdate))}
                   <div><p class="text-xs font-bold text-gray-400 mb-1.5">วัตถุประสงค์ในการทำประกัน</p><div class="flex flex-wrap gap-1.5">${purposes}</div></div>
                   ${detailRow('งบประมาณเบี้ยประกัน', escapeHtml(q.budget) || '<span class="text-gray-400">ไม่ได้ระบุ</span>')}
                   ${detailRow('รายละเอียดเพิ่มเติม', q.note ? escapeHtml(q.note) : '<span class="text-gray-400">ไม่มี</span>')}`;
            document.getElementById('detail-body').innerHTML = `
                ${apptBox}
                ${detailRow('ชื่อ-นามสกุล', escapeHtml(q.full_name))}
                ${detailRow('เบอร์โทรศัพท์', `<a href="${telHref(q.phone)}" class="text-orange-600 font-semibold">${escapeHtml(q.phone)}</a>`)}
                ${midFields}
                ${detailRow(isAppt ? 'เวลาที่ขอนัด' : 'เวลาที่ติดต่อเข้ามา', fmtDateTime(q.created_at))}
                ${detailRow('ความยินยอม', q.consent ? '<span class="text-green-700">✔ ยินยอมให้ติดต่อกลับและเก็บข้อมูล</span>' : '<span class="text-gray-400">-</span>')}
                <div class="pt-3 border-t border-gray-100">
                    ${contactedLine}
                    <div class="flex gap-2 mt-2">
                        <a href="${telHref(q.phone)}" class="flex-1 text-center bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded-full text-sm">📞 โทรหา</a>
                        <button id="mark-btn" data-id="${q.id}" data-undo="${isNew ? '0' : '1'}"
                            class="flex-1 ${isNew ? 'bg-orange-500 hover:bg-orange-600 text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-600'} font-bold py-2.5 rounded-full text-sm">
                            ${isNew ? '✔ ทำเครื่องหมายว่าติดต่อกลับแล้ว' : 'ยกเลิกการติดต่อกลับ'}
                        </button>
                    </div>
                </div>`;
            document.getElementById('mark-btn').addEventListener('click', markContacted);
            openModal();
        }

        async function markContacted(e) {
            const btn = e.currentTarget;
            const id = Number(btn.dataset.id);
            const undo = btn.dataset.undo === '1';
            btn.disabled = true;
            try {
                const res = await fetch(`/api/contact/${id}/contacted`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin',
                    body: JSON.stringify({ undo }),
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'บันทึกไม่สำเร็จ');
                const q = inquiries.find(x => x.id === id);
                if (q) q.contacted_at = d.contacted_at || null;
                toast(undo ? 'ยกเลิกแล้ว' : 'บันทึกว่าติดต่อกลับแล้ว');
                closeModal();
                render(inquiries.length, inquiries.filter(x => x.contacted_at == null).length);
            } catch (err) {
                toast(err.message, false);
                btn.disabled = false;
            }
        }

        function openModal() { const m = document.getElementById('detail-modal'); m.classList.remove('hidden'); m.classList.add('flex'); }
        function closeModal() { const m = document.getElementById('detail-modal'); m.classList.add('hidden'); m.classList.remove('flex'); }
        document.getElementById('detail-close').addEventListener('click', closeModal);
        document.getElementById('detail-modal').addEventListener('click', (e) => { if (e.target.id === 'detail-modal') closeModal(); });

        load();
    </script>
    <script src="/i18n.js"></script>
</body>

</html>
